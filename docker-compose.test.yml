# Full-stack test environment: app + nginx + postgres.
# Host port 8080 -> nginx -> app(8000) -> postgres.
# Separate from docker-compose.local.yml (which runs Postgres only on host 5433).
# Explicit project name prevents accidental collision with the local dev stack.

name: nestory-test

services:
  postgres:
    image: postgres:16
    container_name: nestory-postgres-test
    environment:
      POSTGRES_USER: nestory
      POSTGRES_PASSWORD: nestory
      POSTGRES_DB: nestory
    volumes:
      - nestory-pg-data-test:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nestory -d nestory"]
      interval: 5s
      retries: 10

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nestory-app-test
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      APP_ENV: test
      APP_SECRET_KEY: test-secret-32bytes-test-secret-32
      DATABASE_URL: postgresql+psycopg://nestory:nestory@postgres:5432/nestory
      POSTGRES_HOST: postgres
      POSTGRES_USER: nestory
      ADMIN_EMAIL: admin@test.local
      SESSION_COOKIE_SECURE: "false"
      KAKAO_CLIENT_ID: test-id
      KAKAO_CLIENT_SECRET: test-secret
      KAKAO_REDIRECT_URI: http://localhost:8080/auth/kakao/callback
      NESTORY_DOMAIN: localhost:8080
    volumes:
      - ./app/static:/srv/nestory/static:ro
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import urllib.request; urllib.request.urlopen(\"http://localhost:8000/healthz\")' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  nginx:
    image: nginx:1.27-alpine
    container_name: nestory-nginx-test
    depends_on:
      app:
        condition: service_healthy
    ports:
      - "8080:80"
    volumes:
      - ./deploy/nginx.test.conf:/etc/nginx/conf.d/default.conf:ro
      - ./app/static:/srv/nestory/static:ro

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nestory-worker-test
    command: ["python", "-m", "app.workers.runner"]
    environment:
      APP_ENV: test
      APP_SECRET_KEY: test-secret-32bytes-test-secret-32
      DATABASE_URL: postgresql+psycopg://nestory:nestory@postgres:5432/nestory
      POSTGRES_HOST: postgres
      POSTGRES_USER: nestory
      ADMIN_EMAIL: admin@test.local
      SESSION_COOKIE_SECURE: "false"
      KAKAO_CLIENT_ID: test-id
      KAKAO_CLIENT_SECRET: test-secret
      KAKAO_REDIRECT_URI: http://localhost:8080/auth/kakao/callback
      NESTORY_DOMAIN: localhost:8080
    depends_on:
      postgres:
        condition: service_healthy
      app:
        condition: service_started
    restart: unless-stopped

volumes:
  nestory-pg-data-test:
