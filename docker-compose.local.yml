services:
  postgres:
    image: postgres:16
    container_name: nestory-postgres-local
    environment:
      POSTGRES_USER: nestory
      POSTGRES_PASSWORD: nestory
      POSTGRES_DB: nestory
    ports:
      - "5433:5432"
    volumes:
      - nestory-pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nestory -d nestory"]
      interval: 5s
      retries: 10

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nestory-worker-local
    command: ["python", "-m", "app.workers.runner"]
    environment:
      APP_ENV: local
      APP_SECRET_KEY: local-secret-32bytes-local-secret-32
      DATABASE_URL: postgresql+psycopg://nestory:nestory@postgres:5432/nestory
      POSTGRES_HOST: postgres
      POSTGRES_USER: nestory
      ADMIN_EMAIL: admin@local
      SESSION_COOKIE_SECURE: "false"
      KAKAO_CLIENT_ID: local-id
      KAKAO_CLIENT_SECRET: local-secret
      KAKAO_REDIRECT_URI: http://localhost:8000/auth/kakao/callback
      NESTORY_DOMAIN: localhost:8000
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  nestory-pg-data:
