{# partials/comment_form.html — top-level comment form. Expects: post, current_user. #}
{% if current_user %}
  <form method="post" action="/post/{{ post.id }}/comment#comments" class="mt-4 space-y-2">
    <textarea
      name="body"
      required
      maxlength="2000"
      rows="3"
      placeholder="댓글을 작성하세요"
      class="w-full rounded border border-slate-300 p-2 text-sm focus:border-emerald-500 focus:outline-none"
    ></textarea>
    <div class="flex justify-end">
      <button type="submit"
              class="rounded-md bg-emerald-600 px-4 py-1.5 text-sm font-medium text-white hover:bg-emerald-700">
        댓글 작성
      </button>
    </div>
  </form>
{% else %}
  <p class="mt-4 text-sm text-slate-500">
    댓글을 작성하려면 <a href="/auth/login" class="text-emerald-700 hover:underline">로그인</a>이 필요합니다.
  </p>
{% endif %}
