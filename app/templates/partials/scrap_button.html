{% from "components/_icon.html" import icon %}
{# partials/scrap_button.html — bookmark toggle. Expects: post, scrapped (bool), count (int).
   HTMX swap target — endpoint POSTs to /post/{id}/{scrap|unscrap} and returns this same partial. #}
<button
  type="button"
  id="scrap-btn-{{ post.id }}"
  hx-post="{{ '/post/' ~ post.id ~ '/' ~ ('unscrap' if scrapped else 'scrap') }}"
  hx-target="#scrap-btn-{{ post.id }}"
  hx-swap="outerHTML"
  class="inline-flex items-center gap-1.5 rounded-md border px-3 py-1.5 text-sm
         {{ 'border-emerald-300 bg-emerald-50 text-emerald-700' if scrapped
            else 'border-stone-200 text-stone-600 hover:bg-stone-50' }}"
  aria-pressed="{{ 'true' if scrapped else 'false' }}"
  aria-label="{{ '스크랩 취소' if scrapped else '스크랩' }}"
>
  {{ icon("bookmark-fill" if scrapped else "bookmark", 16) }}
  <span>{{ count }}</span>
</button>
