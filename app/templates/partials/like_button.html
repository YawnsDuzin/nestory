{% from "components/_icon.html" import icon %}
{# partials/like_button.html — heart toggle (Threads-style ghost button). Expects: post, liked (bool), count (int).
   HTMX swap target — endpoint POSTs to /post/{id}/{like|unlike} and returns this same partial. #}
<button
  type="button"
  id="like-btn-{{ post.id }}"
  hx-post="{{ '/post/' ~ post.id ~ '/' ~ ('unlike' if liked else 'like') }}"
  hx-target="#like-btn-{{ post.id }}"
  hx-swap="outerHTML"
  class="inline-flex items-center gap-1.5 rounded-full px-2.5 py-2 text-sm transition
         {{ 'text-rose-600 hover:bg-rose-50' if liked
            else 'text-stone-600 hover:bg-stone-100 hover:text-rose-600' }}"
  aria-pressed="{{ 'true' if liked else 'false' }}"
  aria-label="{{ '좋아요 취소' if liked else '좋아요' }}"
>
  {{ icon("heart-fill" if liked else "heart", 18) }}
  <span class="tabular-nums">{{ count }}</span>
</button>
