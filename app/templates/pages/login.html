{% extends "base.html" %}
{% block title %}로그인 · Nestory{% endblock %}
{% block content %}
<section class="mx-auto max-w-md space-y-6">
  <h1 class="text-2xl font-bold">로그인</h1>

  {% if request.query_params.get("msg") == "password_changed" %}
  <div class="rounded-md border border-emerald-200 bg-emerald-50 px-4 py-3 text-sm text-emerald-800">
    비밀번호가 변경되었습니다. 보안을 위해 모든 기기에서 로그아웃되었으니 다시 로그인해 주세요.
  </div>
  {% endif %}

  <a href="/auth/kakao/start"
     class="flex w-full items-center justify-center gap-2 rounded-md bg-yellow-300 px-4 py-3 font-semibold text-stone-900 hover:bg-yellow-400">
    <span>카카오로 계속하기</span>
  </a>

  <div class="relative text-center text-xs text-stone-400">
    <span class="bg-stone-50 px-2">또는 이메일로 로그인</span>
    <hr class="absolute left-0 right-0 top-1/2 -z-10 border-stone-200">
  </div>

  <form method="post" action="/auth/login" class="space-y-3">
    <label class="block">
      <span class="text-sm text-stone-700">이메일</span>
      <input name="email" type="email" required autocomplete="email"
             class="mt-1 block w-full rounded-md border-stone-300 shadow-sm focus:border-emerald-500 focus:ring-emerald-500">
    </label>
    <label class="block">
      <span class="text-sm text-stone-700">비밀번호</span>
      <input name="password" type="password" required autocomplete="current-password"
             class="mt-1 block w-full rounded-md border-stone-300 shadow-sm">
    </label>
    <button type="submit" class="w-full rounded-md bg-emerald-600 py-2 font-semibold text-white hover:bg-emerald-700">
      로그인
    </button>
  </form>

  <p class="text-center text-sm text-stone-500">
    계정이 없으신가요?
    <a href="/auth/signup" class="font-medium text-emerald-700 hover:underline">가입하기</a>
  </p>
</section>
{% endblock %}
