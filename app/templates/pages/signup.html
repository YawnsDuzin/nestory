{% extends "base.html" %}
{% block title %}가입 · Nestory{% endblock %}
{% block content %}
<section class="mx-auto max-w-md space-y-6">
  <h1 class="text-2xl font-bold">계정 만들기</h1>
  <form method="post" action="/auth/signup" class="space-y-3">
    <label class="block">
      <span class="text-sm text-stone-700">이메일</span>
      <input name="email" type="email" required autocomplete="email"
             class="mt-1 block w-full rounded-md border-stone-300">
    </label>
    <label class="block">
      <span class="text-sm text-stone-700">아이디 (3–32자, 소문자·숫자·_)</span>
      <input name="username" pattern="[a-z0-9_]{3,32}" required
             class="mt-1 block w-full rounded-md border-stone-300">
    </label>
    <label class="block">
      <span class="text-sm text-stone-700">닉네임</span>
      <input name="display_name" required maxlength="64"
             class="mt-1 block w-full rounded-md border-stone-300">
    </label>
    <label class="block">
      <span class="text-sm text-stone-700">비밀번호 (8자 이상)</span>
      <input name="password" type="password" minlength="8" required autocomplete="new-password"
             class="mt-1 block w-full rounded-md border-stone-300">
    </label>
    <button type="submit" class="w-full rounded-md bg-emerald-600 py-2 font-semibold text-white hover:bg-emerald-700">
      가입하기
    </button>
  </form>
</section>
{% endblock %}
