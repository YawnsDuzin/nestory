{% from "components/_icon.html" import icon %}
{# Threads-style composer: 보더리스 인풋, 자동 확장 textarea.
   제목은 큰 굵은 텍스트로(threads 본문의 첫 줄 같은 느낌), 본문은 그 아래. #}
<div class="space-y-1">
  {% if regions %}
    <div class="flex items-center gap-1.5 text-sm text-stone-500">
      <span class="text-stone-400">{{ icon("map-pin", 14) }}</span>
      <select name="region_id" required
              class="bg-transparent text-stone-700 focus:outline-none focus:ring-0 border-0 p-0 pr-6 text-sm">
        {% for r in regions %}
          <option value="{{ r.id }}"
                  {% if form and form.region_id == r.id %}selected{% endif %}>
            {{ r.sido }} {{ r.sigungu }}
          </option>
        {% endfor %}
      </select>
    </div>
  {% endif %}

  <input type="text" name="title" required maxlength="300"
         placeholder="제목"
         class="w-full border-0 p-0 text-[17px] font-semibold text-stone-900 placeholder-stone-400 focus:outline-none focus:ring-0 bg-transparent"
         value="{{ form.title if form else '' }}">

  <textarea name="body" id="body-textarea" required rows="5"
            placeholder="무슨 일이 일어나고 있나요?"
            x-data="{ resize() { this.$el.style.height = 'auto'; this.$el.style.height = this.$el.scrollHeight + 'px'; } }"
            x-init="resize()" @input="resize()"
            class="w-full border-0 p-0 text-[15px] leading-relaxed text-stone-900 placeholder-stone-400 focus:outline-none focus:ring-0 bg-transparent resize-none overflow-hidden">{{ form.body if form else '' }}</textarea>
</div>
