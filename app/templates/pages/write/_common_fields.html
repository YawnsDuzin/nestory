{% from "components/_icon.html" import icon %}
<div class="rounded-lg border border-stone-200 bg-white p-5 space-y-3">
  <label class="block">
    <span class="text-sm font-semibold text-stone-900">제목</span>
    <input type="text" name="title" required maxlength="300"
           class="mt-1 w-full rounded-md border border-stone-300 p-2"
           value="{{ form.title if form else '' }}">
  </label>
  <label class="block">
    <span class="text-sm font-semibold text-stone-900">본문 (마크다운)</span>
    <textarea name="body" id="body-textarea" required rows="10"
              class="mt-1 w-full rounded-md border border-stone-300 p-2 font-mono text-sm">{{ form.body if form else '' }}</textarea>
  </label>
  <div>
    <label class="inline-flex items-center gap-2 rounded-md bg-stone-100 px-3 py-2 text-sm cursor-pointer hover:bg-stone-200">
      <span class="text-stone-600">{{ icon("paperclip", 16) }}</span>이미지 첨부
      <input type="file" name="image" accept="image/jpeg,image/png,image/webp" class="hidden"
             hx-post="/htmx/image/upload"
             hx-trigger="change"
             hx-encoding="multipart/form-data"
             hx-on::after-request="if (event.detail.successful) { const d = JSON.parse(event.detail.xhr.responseText); document.getElementById('body-textarea').value += '\n\n![](' + d.url + ')'; }">
    </label>
    <p class="text-xs text-stone-500 mt-1">JPEG/PNG/WebP, 최대 10MB</p>
  </div>
</div>
