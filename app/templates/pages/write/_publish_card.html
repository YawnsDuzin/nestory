{% from "components/_icon.html" import icon %}
{# Threads 컴포저 푸터 — 좌측 이미지 아이콘, 우측 "게시" 블랙 pill. #}
<div class="mt-5 flex items-center justify-between pt-3 border-t border-stone-200">
  <label class="inline-flex items-center gap-1.5 rounded-full px-2.5 py-2 text-sm text-stone-500 hover:bg-stone-100 hover:text-stone-700 cursor-pointer"
         title="이미지 첨부 (JPEG/PNG/WebP, 최대 10MB)">
    {{ icon("image", 18) }}
    <input type="file" name="image" accept="image/jpeg,image/png,image/webp" class="hidden"
           hx-post="/htmx/image/upload"
           hx-trigger="change"
           hx-encoding="multipart/form-data"
           hx-on::after-request="if (event.detail.successful) { const d = JSON.parse(event.detail.xhr.responseText); Alpine.$data(this.closest('form')).addImage(d.url); this.value=''; }">
  </label>
  <div class="flex items-center gap-3">
    <kbd class="hidden sm:inline-flex items-center gap-1 text-[11px] text-stone-400 tabular-nums" aria-hidden="true">
      <span class="rounded border border-stone-200 bg-stone-50 px-1.5 py-0.5">⌘/Ctrl</span>
      +
      <span class="rounded border border-stone-200 bg-stone-50 px-1.5 py-0.5">Enter</span>
    </kbd>
    <button type="submit"
            class="rounded-full bg-stone-900 text-white px-5 py-2 text-sm font-semibold hover:bg-stone-700">
      {{ submit_label | default('게시') }}
    </button>
  </div>
</div>
