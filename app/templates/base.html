<!doctype html>
<html lang="ko" class="h-full">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Nestory{% endblock %}</title>
  <meta name="description" content="은퇴자 전원주택 커뮤니티 — 정착의 전 과정을 아카이브합니다.">
  <meta name="theme-color" content="#1f3d36">
  <link rel="icon" type="image/svg+xml" href="{{ url_for('static', path='/img/logo-c-mark.svg') }}">
  <link rel="apple-touch-icon" href="{{ url_for('static', path='/img/logo-c-mark.svg') }}">
  <link rel="manifest" href="{{ url_for('static', path='/manifest.webmanifest') }}">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Nestory">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/htmx.org@1.9.12" defer></script>
  <script src="https://unpkg.com/alpinejs@3.14.1/dist/cdn.min.js" defer></script>
  <script src="{{ url_for('static', path='/js/app.js') }}" defer></script>
  <style>[x-cloak] { display: none !important; }</style>
</head>
<body class="h-full bg-slate-50 text-slate-900 antialiased">
  {% include "components/_kakao_inapp_banner.html" %}
  {% include "components/nav.html" %}
  <main class="mx-auto max-w-3xl px-4 py-6">
    {% block content %}{% endblock %}
  </main>
  <footer class="mt-16 py-6 text-center text-xs text-slate-500">
    © Nestory · 전원주택 정착의 여정
  </footer>
</body>
</html>
