# /etc/nginx/sites-available/nestory
# cloudflared tunnelмқҙ 127.0.0.1лЎң мҡ”мІӯмқ„ ліҙлғ„.
# л”°лқјм„ң NginxлҠ” 127.0.0.1:80 м—җм„ңл§Ң мҲҳмӢ н•ҳкі ,
# Uvicornмқ„ 127.0.0.1:8000мңјлЎң н”„лЎқмӢңн•ңлӢӨ.

server {
    listen 127.0.0.1:80 default_server;
    server_name _;

    client_max_body_size 12M;  # мқҙлҜём§Җ м—…лЎңл“ң м—¬мң  (Phase 1м—җм„ң ліёкІ© мӮ¬мҡ©)

    # м •м Ғ нҢҢмқј вҖ” FastAPIм—җм„ң м„ңл№ҷн•ҳлҗҳ Nginx мәҗмӢң м¶”мІң
    location /static/ {
        alias /opt/nestory/app/static/;
        expires 7d;
        add_header Cache-Control "public, max-age=604800, immutable";
        access_log off;
    }

    # (Phase 1+) лҜёл””м–ҙ л””л үнҶ лҰ¬
    # location /media/ {
    #     alias /var/nestory/media/;
    #     expires 30d;
    #     access_log off;
    # }

    location /healthz {
        proxy_pass http://127.0.0.1:8000;
        access_log off;
    }

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_redirect off;
        proxy_buffering off;
        proxy_read_timeout 60s;
    }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;
    gzip_min_length 1024;
}
