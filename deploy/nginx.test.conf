# Test-environment Nginx config, used inside a Docker container.
# Differs from deploy/nginx.conf (prod/RPi) in:
#   - listens on 0.0.0.0:80 (exposed by docker-compose port publish)
#   - proxies to "app:8000" via docker DNS (not 127.0.0.1)
#   - serves /static/ from /srv/nestory/static (mounted volume)

server {
    listen 0.0.0.0:80 default_server;
    server_name _;

    client_max_body_size 12M;

    location /static/ {
        alias /srv/nestory/static/;
        expires 7d;
        add_header Cache-Control "public, max-age=604800, immutable";
        access_log off;
    }

    location /healthz {
        proxy_pass http://app:8000;
        access_log off;
    }

    location / {
        proxy_pass http://app:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto http;
        proxy_redirect off;
        proxy_buffering off;
        proxy_read_timeout 60s;
    }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;
    gzip_min_length 1024;
}
